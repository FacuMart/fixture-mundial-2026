<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · FIFA WC 2026</title>
  <link rel="icon" href="assets/tournaments_fifa-world-cup-2026.football-logos.cc.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- ── Login ─────────────────────────────────────────────── -->
  <section id="login-section">
    <div class="login-box">
      <h1>Admin · FIFA WC 2026</h1>
      <p>Cargá los resultados del torneo</p>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input id="password" type="password" required autocomplete="current-password">
        </div>
        <button class="btn-primary" type="submit">Ingresar</button>
        <div class="login-error" id="login-error"></div>
      </form>
    </div>
  </section>

  <!-- ── Panel admin ───────────────────────────────────────── -->
  <section id="admin-panel" hidden>
    <div class="admin-topbar">
      <h1>Panel de Resultados</h1>
      <span id="admin-status" class="admin-status"></span>
      <span id="last-saved"></span>
      <button class="btn-save save-all-btn" id="save-btn">Guardar resultados</button>
      <button class="btn-logout" id="logout-btn">Cerrar sesión</button>
    </div>

    <div id="groups-admin"></div>

    <div class="admin-bottom-bar">
      <button class="btn-save save-all-btn" id="save-btn-bottom">Guardar resultados</button>
    </div>
  </section>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/data/groups.js"></script>
  <script src="js/admin.js"></script>

</body>
</html>
